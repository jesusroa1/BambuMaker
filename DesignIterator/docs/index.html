<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<title>BambuMaker</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --top-h: 52px;
    --params-h: 44px;
    --sheet-peek: 72px;
    --sheet-full: 55vh;
    --radius: 14px;
    --bg: #111;
    --surface: #1c1c1e;
    --surface2: #2c2c2e;
    --border: rgba(255,255,255,0.1);
    --text: #f5f5f7;
    --muted: rgba(255,255,255,0.45);
    --accent: #0a84ff;
  }

  html, body {
    height: 100%; height: 100dvh;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }

  /* ── Top bar ─────────────────────────────────────── */
  #topbar {
    position: fixed; top: 0; left: 0; right: 0;
    height: var(--top-h);
    background: rgba(17,17,17,0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 0.5px solid var(--border);
    display: flex; align-items: center;
    padding: 0 14px;
    gap: 10px;
    z-index: 100;
    padding-top: env(safe-area-inset-top, 0);
  }
  #design-name {
    flex: 1;
    font-size: 15px; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  #download-btn, #download-3mf-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 20px;
    padding: 7px 16px;
    font-size: 13px; font-weight: 600;
    cursor: pointer;
    flex-shrink: 0;
    display: flex; align-items: center; gap: 5px;
  }
  #download-btn:disabled { background: var(--surface2); color: var(--muted); }
  #download-btn svg, #download-3mf-btn svg { width: 14px; height: 14px; }
  #download-3mf-btn { background: #30d158; color: #003310; }

  #capture-btn {
    background: var(--surface2);
    color: var(--text);
    border: none;
    border-radius: 20px;
    padding: 7px 12px;
    font-size: 13px; font-weight: 600;
    cursor: pointer;
    flex-shrink: 0;
    display: flex; align-items: center; gap: 5px;
  }
  #capture-btn:disabled { color: var(--muted); opacity: 0.5; }
  #capture-btn svg { width: 15px; height: 15px; }

  /* ── Capture modal ───────────────────────────────── */
  #capture-modal {
    position: fixed; inset: 0; z-index: 300;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: none;
    flex-direction: column;
    align-items: center; justify-content: center;
    padding: 20px;
    padding-top: calc(20px + env(safe-area-inset-top, 0));
    padding-bottom: calc(20px + env(safe-area-inset-bottom, 0));
  }
  #capture-modal.open { display: flex; }
  #capture-preview {
    max-width: 100%;
    max-height: calc(100% - 78px);
    border-radius: 12px;
    border: 0.5px solid var(--border);
    object-fit: contain;
    background: var(--bg);
  }
  #capture-actions {
    display: flex; gap: 10px; margin-top: 18px;
    flex-wrap: wrap; justify-content: center;
  }
  .capture-action {
    border: none; border-radius: 22px;
    padding: 11px 20px;
    font-size: 14px; font-weight: 600;
    cursor: pointer;
    display: flex; align-items: center; gap: 6px;
    -webkit-tap-highlight-color: transparent;
  }
  .capture-action.primary { background: var(--accent); color: #fff; }
  .capture-action.secondary { background: var(--surface2); color: var(--text); }
  .capture-action svg { width: 16px; height: 16px; }
  .capture-action:active { opacity: 0.75; }

  /* ── 3D canvas ───────────────────────────────────── */
  #viewer {
    position: fixed;
    top: var(--top-h); left: 0; right: 0;
    bottom: calc(var(--params-h) + var(--sheet-peek));
    overflow: hidden;
  }
  #viewer canvas { display: block; width: 100% !important; height: 100% !important; }

  #empty-state {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 10px; color: var(--muted);
    font-size: 14px;
  }
  #empty-state svg { width: 48px; height: 48px; opacity: 0.4; }

  /* ── Params strip ────────────────────────────────── */
  #params-strip {
    position: fixed;
    bottom: var(--sheet-peek);
    left: 0; right: 0;
    height: var(--params-h);
    background: rgba(17,17,17,0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-top: 0.5px solid var(--border);
    display: flex; align-items: center;
    padding: 0 14px;
    gap: 6px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  #params-strip::-webkit-scrollbar { display: none; }

  .param-pill {
    flex-shrink: 0;
    background: var(--surface2);
    border-radius: 20px;
    padding: 4px 10px;
    font-size: 12px;
    color: var(--muted);
  }
  .param-pill b { color: var(--text); font-weight: 500; }

  /* ── Bottom sheet ────────────────────────────────── */
  #sheet {
    position: fixed;
    left: 0; right: 0;
    bottom: 0;
    height: var(--sheet-full);
    background: var(--surface);
    border-radius: var(--radius) var(--radius) 0 0;
    border-top: 0.5px solid var(--border);
    transform: translateY(calc(var(--sheet-full) - var(--sheet-peek)));
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 90;
    display: flex; flex-direction: column;
    padding-bottom: env(safe-area-inset-bottom, 0);
  }
  #sheet.open { transform: translateY(0); }

  #sheet-handle-area {
    padding: 10px 0 6px;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    cursor: pointer; flex-shrink: 0;
  }
  .handle-bar {
    width: 36px; height: 4px;
    background: var(--border);
    border-radius: 2px;
  }
  #sheet-label {
    font-size: 12px; font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  #design-list {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 4px 12px 16px;
    display: flex; flex-direction: column; gap: 8px;
  }

  .design-card {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px;
    border-radius: 12px;
    background: var(--surface2);
    cursor: pointer;
    border: 1.5px solid transparent;
    transition: border-color 0.15s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .design-card.active { border-color: var(--accent); }
  .design-card:active { opacity: 0.75; }

  .card-thumb {
    width: 52px; height: 52px;
    border-radius: 8px;
    background: #333;
    flex-shrink: 0;
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  .card-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .card-thumb svg { width: 24px; height: 24px; opacity: 0.3; }

  .card-info { flex: 1; min-width: 0; }
  .card-name { font-size: 15px; font-weight: 600; }
  .card-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .card-badge {
    flex-shrink: 0;
    background: rgba(10,132,255,0.15);
    color: var(--accent);
    font-size: 11px; font-weight: 600;
    padding: 3px 8px;
    border-radius: 20px;
  }
  .card-badge.pending { background: rgba(255,255,255,0.06); color: var(--muted); }

  /* ── Loading overlay ─────────────────────────────── */
  #loading {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px; z-index: 200;
    font-size: 14px; color: var(--muted);
    transition: opacity 0.4s;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }
  .spinner {
    width: 28px; height: 28px;
    border: 2.5px solid var(--surface2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- Top bar -->
<div id="topbar">
  <span id="design-name">BambuMaker</span>
  <button id="capture-btn" disabled title="Capture orthographic views">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
    Views
  </button>
  <button id="download-3mf-btn" style="display:none">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    3MF
  </button>
  <button id="download-btn" disabled>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    STL
  </button>
</div>

<!-- 3D viewer -->
<div id="viewer">
  <div id="empty-state">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
    <span>Select a design below</span>
  </div>
</div>

<!-- Params strip -->
<div id="params-strip"></div>

<!-- Bottom sheet -->
<div id="sheet">
  <div id="sheet-handle-area">
    <div class="handle-bar"></div>
    <span id="sheet-label">Designs</span>
  </div>
  <div id="design-list"></div>
</div>

<!-- Capture modal -->
<div id="capture-modal">
  <img id="capture-preview" alt="Orthographic views">
  <div id="capture-actions">
    <button class="capture-action secondary" id="capture-close">Close</button>
    <button class="capture-action secondary" id="capture-download">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Download
    </button>
    <button class="capture-action primary" id="capture-copy">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      Copy
    </button>
  </div>
</div>

<!-- Loading -->
<div id="loading"><div class="spinner"></div><span>Loading…</span></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/STLLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/libs/fflate.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/3MFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
// ── State ────────────────────────────────────────────────
let manifest = { designs: [] };
let current = null;
let sheetOpen = false;

// ── DOM refs ─────────────────────────────────────────────
const $name     = document.getElementById('design-name');
const $dl       = document.getElementById('download-btn');
const $dl3mf    = document.getElementById('download-3mf-btn');
const $params   = document.getElementById('params-strip');
const $list     = document.getElementById('design-list');
const $sheet    = document.getElementById('sheet');
const $loading  = document.getElementById('loading');
const $empty    = document.getElementById('empty-state');
const $handle   = document.getElementById('sheet-handle-area');
const $capture  = document.getElementById('capture-btn');
const $capModal = document.getElementById('capture-modal');
const $capImg   = document.getElementById('capture-preview');
const $capClose = document.getElementById('capture-close');
const $capDl    = document.getElementById('capture-download');
const $capCopy  = document.getElementById('capture-copy');

// ── Three.js setup ───────────────────────────────────────
const viewerEl = document.getElementById('viewer');
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x111111, 1);
viewerEl.appendChild(renderer.domElement);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(40, 1, 0.1, 2000);
camera.position.set(0, -180, 120);
camera.lookAt(0, 0, 0);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.1;
controls.enablePan = false;
controls.minDistance = 50;
controls.maxDistance = 500;

scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const dir1 = new THREE.DirectionalLight(0xffffff, 0.9);
dir1.position.set(1, 1, 2);
scene.add(dir1);
const dir2 = new THREE.DirectionalLight(0x88aaff, 0.3);
dir2.position.set(-1, -1, -1);
scene.add(dir2);

let meshObj = null;

function resizeRenderer() {
  const w = viewerEl.clientWidth;
  const h = viewerEl.clientHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}

new ResizeObserver(resizeRenderer).observe(viewerEl);
resizeRenderer();
animate();

// ── Orthographic capture ─────────────────────────────────
// The four views to render. `dir` is the direction the camera looks
// (from camera toward the object); `up` orients the frame.
const CAPTURE_VIEWS = [
  { label: 'Top',       dir: new THREE.Vector3( 0, -1,  0), up: new THREE.Vector3(0, 0,  1) },
  { label: 'Front',     dir: new THREE.Vector3( 0,  0, -1), up: new THREE.Vector3(0, 1,  0) },
  { label: 'Side',      dir: new THREE.Vector3(-1,  0,  0), up: new THREE.Vector3(0, 1,  0) },
  { label: 'Isometric', dir: new THREE.Vector3(-1, -1, -1), up: new THREE.Vector3(0, 1,  0) },
];

let captureRenderer = null;      // lazy offscreen renderer
let lastCaptureBlob = null;      // current composite, for copy/download

// Render one auto-fitted orthographic view into the capture renderer
// and return its canvas. Fit is computed from the mesh's world bounding
// box so the object fills the frame the same way in every view.
function renderOrthoView(view, tilePx) {
  if (!captureRenderer) {
    captureRenderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, preserveDrawingBuffer: true });
    captureRenderer.setClearColor(0x1c1c1e, 1);
  }
  captureRenderer.setPixelRatio(2);
  captureRenderer.setSize(tilePx, tilePx, false);

  scene.updateMatrixWorld(true);
  const box = new THREE.Box3().setFromObject(meshObj);
  const center = box.getCenter(new THREE.Vector3());
  const sphere = box.getBoundingSphere(new THREE.Sphere());
  const radius = sphere.radius || 1;
  const dist = radius * 4 + 10;

  const dir = view.dir.clone().normalize();
  const cam = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, dist + radius * 2 + 10);
  cam.position.copy(center).addScaledVector(dir, -dist);
  cam.up.copy(view.up);
  cam.lookAt(center);
  cam.updateMatrixWorld(true);

  // Camera right/up axes in world space (columns 0 and 1 of matrixWorld).
  const e = cam.matrixWorld.elements;
  const right = new THREE.Vector3(e[0], e[1], e[2]);
  const camUp = new THREE.Vector3(e[4], e[5], e[6]);

  // Fit: largest projected half-extent of the 8 box corners.
  let half = 0;
  for (let xi = 0; xi < 2; xi++)
    for (let yi = 0; yi < 2; yi++)
      for (let zi = 0; zi < 2; zi++) {
        const corner = new THREE.Vector3(
          xi ? box.max.x : box.min.x,
          yi ? box.max.y : box.min.y,
          zi ? box.max.z : box.min.z
        ).sub(center);
        half = Math.max(half, Math.abs(corner.dot(right)), Math.abs(corner.dot(camUp)));
      }
  half *= 1.08; // small padding so the object never touches the edge
  cam.left = -half; cam.right = half; cam.top = half; cam.bottom = -half;
  cam.updateProjectionMatrix();

  captureRenderer.render(scene, cam);
  return captureRenderer.domElement;
}

// Build the 2×2 composite PNG with a name header and per-view labels.
function buildComposite() {
  const tile   = 512;   // logical tile size
  const gap    = 22;
  const margin = 34;
  const headerH = 76;
  const labelH  = 48;
  const cols = 2, rows = 2;

  const W = margin * 2 + tile * cols + gap * (cols - 1);
  const H = margin * 2 + headerH + tile * rows + labelH * rows + gap * (rows - 1);

  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  // Background
  ctx.fillStyle = '#111111';
  ctx.fillRect(0, 0, W, H);

  // Header — object name
  ctx.fillStyle = '#f5f5f7';
  ctx.font = '600 38px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(current ? current.name : 'model', W / 2, margin + headerH / 2);

  // Tiles + labels
  CAPTURE_VIEWS.forEach((view, i) => {
    const col = i % cols, row = Math.floor(i / cols);
    const x = margin + col * (tile + gap);
    const y = margin + headerH + row * (tile + labelH + gap);

    const tileCanvas = renderOrthoView(view, tile);
    ctx.drawImage(tileCanvas, x, y, tile, tile);

    // thin border around each tile
    ctx.strokeStyle = 'rgba(255,255,255,0.10)';
    ctx.lineWidth = 1;
    ctx.strokeRect(x + 0.5, y + 0.5, tile - 1, tile - 1);

    // angle label below the image
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.font = '600 26px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
    ctx.fillText(view.label, x + tile / 2, y + tile + labelH / 2);
  });

  return canvas;
}

function openCaptureModal() {
  if (!meshObj) return;
  const canvas = buildComposite();
  $capImg.src = canvas.toDataURL('image/png');
  canvas.toBlob((blob) => { lastCaptureBlob = blob; }, 'image/png');
  $capCopy.textContent = 'Copy';
  $capModal.classList.add('open');
}

function closeCaptureModal() { $capModal.classList.remove('open'); }

async function copyComposite() {
  try {
    // Pass a Promise<Blob> so Safari keeps the user-gesture chain intact.
    const item = new ClipboardItem({
      'image/png': new Promise((resolve) => {
        if (lastCaptureBlob) return resolve(lastCaptureBlob);
        buildComposite().toBlob((b) => resolve(b), 'image/png');
      }),
    });
    await navigator.clipboard.write([item]);
    flashCopied('Copied!');
  } catch (err) {
    console.warn('Clipboard image copy failed', err);
    flashCopied('Press & hold image to copy');
  }
}

function flashCopied(msg) {
  const prev = 'Copy';
  $capCopy.textContent = msg;
  setTimeout(() => { $capCopy.textContent = prev; }, 1600);
}

function downloadComposite() {
  const name = (current ? current.name : 'model') + '-views.png';
  const finish = (blob) => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = name; a.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  };
  if (lastCaptureBlob) finish(lastCaptureBlob);
  else buildComposite().toBlob(finish, 'image/png');
}

$capture.addEventListener('click', openCaptureModal);
$capClose.addEventListener('click', closeCaptureModal);
$capCopy.addEventListener('click', copyComposite);
$capDl.addEventListener('click', downloadComposite);
$capModal.addEventListener('click', (e) => { if (e.target === $capModal) closeCaptureModal(); });

// ── Load model (colored 3MF preferred, blue STL fallback) ─
function clearModel() {
  if (meshObj) {
    scene.remove(meshObj);
    meshObj.traverse(o => { if (o.geometry) o.geometry.dispose(); });
    meshObj = null;
  }
}

// Center, normalize to ~120 units, convert z-up → y-up, add to scene.
// Flat plaques (cake toppers, signs) get flipped the other way so their
// relief face — not their flat underside — greets the camera.
function setupModel(obj) {
  $empty.style.display = 'none';
  clearModel();

  const rawSize = new THREE.Box3().setFromObject(obj).getSize(new THREE.Vector3());
  const isFlat = rawSize.z < 0.25 * Math.min(rawSize.x, rawSize.y);
  obj.rotation.x = isFlat ? Math.PI / 2 : -Math.PI / 2;
  const pivot = new THREE.Group();
  pivot.add(obj);

  const box = new THREE.Box3().setFromObject(pivot);
  const center = box.getCenter(new THREE.Vector3());
  obj.position.sub(center);
  const size = box.getSize(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z) || 1;
  pivot.scale.setScalar(120 / maxDim);

  meshObj = pivot;
  scene.add(pivot);

  camera.position.set(0, -216, 96);
  camera.lookAt(0, 0, 0);
  controls.reset();

  $capture.disabled = false;
}

function showLoadError() {
  $capture.disabled = true;
  $empty.querySelector('span').textContent = 'STL not compiled yet — push to trigger build';
  $empty.style.display = '';
}

function loadSTL(url) {
  new THREE.STLLoader().load(url, (geometry) => {
    const mat = new THREE.MeshPhongMaterial({
      color: 0x0a84ff,
      specular: 0x333333,
      shininess: 30,
    });
    setupModel(new THREE.Mesh(geometry, mat));
  }, undefined, showLoadError);
}

function load3MF(url, fallbackStlUrl) {
  new THREE.ThreeMFLoader().load(url, setupModel, undefined, () => {
    if (fallbackStlUrl) loadSTL(fallbackStlUrl); else showLoadError();
  });
}

// ── Select design ─────────────────────────────────────────
function selectDesign(d) {
  current = d;
  $name.textContent = d.name;

  // Params strip
  $params.innerHTML = '';
  if (d.params && Object.keys(d.params).length) {
    for (const [k, v] of Object.entries(d.params)) {
      const pill = document.createElement('div');
      pill.className = 'param-pill';
      pill.innerHTML = `${k}: <b>${v}</b>`;
      $params.appendChild(pill);
    }
    const commit = document.createElement('div');
    commit.className = 'param-pill';
    commit.innerHTML = `last: <b>${d.lastCommit}</b>`;
    $params.appendChild(commit);
  }

  // Download buttons — 3MF (multi-color) shown only when the design has one
  if (d.stl) {
    $dl.disabled = false;
    $dl.onclick = () => {
      const a = document.createElement('a');
      a.href = d.stl;
      a.download = `${d.name}.stl`;
      a.click();
    };
  } else {
    $dl.disabled = true;
    $dl.onclick = null;
  }
  // Prefer the Bambu Studio project flavor for download: it keeps each color
  // part mapped to its own filament. The generic 3MF (used for rendering)
  // imports into Bambu Studio as a single flattened object.
  const dl3mfFile = d.bambu3MF || d.threeMF;
  if (dl3mfFile) {
    $dl3mf.style.display = 'flex';
    $dl3mf.onclick = () => {
      const a = document.createElement('a');
      a.href = dl3mfFile;
      a.download = `${d.name}.3mf`;
      a.click();
    };
  } else {
    $dl3mf.style.display = 'none';
    $dl3mf.onclick = null;
  }

  // Load model — append build timestamp so browsers don't serve a stale cached
  // file after CI regenerates it (manifest is always fetched fresh).
  const bust = '?v=' + encodeURIComponent(manifest.generated || Date.now());
  if (d.threeMF && THREE.ThreeMFLoader) {
    load3MF(d.threeMF + bust, d.stl ? d.stl + bust : null);
  } else if (d.stl) {
    loadSTL(d.stl + bust);
  } else {
    clearModel();
    $capture.disabled = true;
    $empty.querySelector('span').textContent = 'Build pending — push a commit to compile';
    $empty.style.display = '';
  }

  // Highlight active card
  document.querySelectorAll('.design-card').forEach(el => {
    el.classList.toggle('active', el.dataset.name === d.name);
  });

  closeSheet();
}

// ── Build design list ─────────────────────────────────────
function buildList() {
  $list.innerHTML = '';
  if (!manifest.designs.length) {
    $list.innerHTML = '<p style="color:var(--muted);font-size:13px;padding:8px 4px">No designs yet.</p>';
    return;
  }
  for (const d of manifest.designs) {
    const card = document.createElement('div');
    card.className = 'design-card';
    card.dataset.name = d.name;

    const thumb = document.createElement('div');
    thumb.className = 'card-thumb';
    if (d.preview) {
      const img = document.createElement('img');
      img.src = d.preview;
      img.alt = d.name;
      thumb.appendChild(img);
    } else {
      thumb.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>`;
    }

    const info = document.createElement('div');
    info.className = 'card-info';
    info.innerHTML = `<div class="card-name">${d.name}</div><div class="card-meta">${d.updated} · ${d.lastCommit}</div>`;

    const badge = document.createElement('div');
    if (d.stl) {
      badge.className = 'card-badge';
      badge.textContent = 'Ready';
    } else {
      badge.className = 'card-badge pending';
      badge.textContent = 'Pending';
    }

    card.appendChild(thumb);
    card.appendChild(info);
    card.appendChild(badge);
    card.onclick = () => selectDesign(d);
    $list.appendChild(card);
  }
}

// ── Sheet toggle ──────────────────────────────────────────
function openSheet()  { sheetOpen = true;  $sheet.classList.add('open'); }
function closeSheet() { sheetOpen = false; $sheet.classList.remove('open'); }
function toggleSheet() { sheetOpen ? closeSheet() : openSheet(); }

$handle.addEventListener('click', toggleSheet);

// Swipe down to close
let touchStartY = 0;
$sheet.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, { passive: true });
$sheet.addEventListener('touchend', e => {
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (dy > 50) closeSheet();
}, { passive: true });

// ── Fetch manifest & init ─────────────────────────────────
async function init() {
  try {
    const res = await fetch('manifest.json?t=' + Date.now());
    if (res.ok) manifest = await res.json();
  } catch (e) {
    console.warn('manifest.json not found — using empty state');
  }

  buildList();

  // Auto-select first ready design, else first design
  const first = manifest.designs.find(d => d.stl) || manifest.designs[0];
  if (first) selectDesign(first);

  $loading.classList.add('hidden');

  // Open sheet if nothing is ready yet so user can see the list
  if (!first || !first.stl) setTimeout(openSheet, 600);
}

init();
</script>
</body>
</html>
