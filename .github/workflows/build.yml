name: Build 3D Designs

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    # Hard ceiling so a runaway render can never sit for GitHub's default
    # 6 hours holding up the publish. Per-design timeouts (below) normally
    # catch trouble long before this.
    timeout-minutes: 25
    defaults:
      run:
        working-directory: DesignIterator

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install OpenSCAD + Xvfb
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y openscad xvfb

      - name: Compile designs
        run: |
          mkdir -p docs/designs

          # A single slow/hanging design (e.g. a heavy SVG import) must never
          # stall the whole publish. Bound each OpenSCAD call; on timeout we
          # skip that artifact and keep going, so every other design and the
          # manifest still get regenerated and published.
          STL_TIMEOUT=300   # seconds
          PNG_TIMEOUT=240   # seconds

          for design_dir in designs/*/; do
            name=$(basename "$design_dir")
            scad="$design_dir$name.scad"

            if [ ! -f "$scad" ]; then
              echo "⚠️  No $name.scad found in $design_dir — skipping"
              continue
            fi

            echo "▶ Building $name..."
            mkdir -p "docs/designs/$name"

            # Write to a temp file and only swap it in on success, so a timeout
            # mid-write can't corrupt or half-overwrite the previously good STL.
            stl_out="docs/designs/$name/$name.stl"
            stl_tmp="docs/designs/$name/$name.new.stl"
            if timeout "${STL_TIMEOUT}s" openscad -o "$stl_tmp" "$scad"; then
              mv "$stl_tmp" "$stl_out"
              echo "  ✓ STL"
            else
              rc=$?
              rm -f "$stl_tmp"
              if [ "$rc" -eq 124 ]; then
                echo "  ✗ STL export timed out after ${STL_TIMEOUT}s — keeping previous STL"
              else
                echo "  ✗ STL export failed (exit $rc)"
              fi
            fi

            png_out="docs/designs/$name/preview.png"
            png_tmp="docs/designs/$name/preview.new.png"
            if timeout "${PNG_TIMEOUT}s" xvfb-run -a openscad \
              --camera=0,0,0,50,0,25,250 \
              --imgsize=600,600 \
              --colorscheme=Tomorrow \
              -o "$png_tmp" \
              "$scad"; then
              mv "$png_tmp" "$png_out"
              echo "  ✓ preview.png"
            else
              rc=$?
              rm -f "$png_tmp"
              if [ "$rc" -eq 124 ]; then
                echo "  ✗ Preview render timed out after ${PNG_TIMEOUT}s — keeping previous preview"
              else
                echo "  ✗ Preview render failed (exit $rc)"
              fi
            fi
          done

      - name: Generate manifest
        run: python3 scripts/generate_manifest.py

      - name: Sync to root docs/ for GitHub Pages
        working-directory: ${{ github.workspace }}
        run: |
          rsync -a --delete DesignIterator/docs/ docs/
          touch docs/.nojekyll

      - name: Commit generated files
        working-directory: ${{ github.workspace }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add DesignIterator/docs/ docs/
          git diff --staged --quiet \
            && echo "Nothing to commit" \
            || (git commit -m "build: regenerate docs [skip ci]" && git push)
